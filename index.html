<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعوة فرح</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Tajawal:wght@500;800&display=swap" rel="stylesheet">
    <style>
        /* --- المتغيرات الأساسية (سيتم تعديلها بواسطة الجافاسكربت) --- */
        :root {
            --bg-gradient: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            --text-color: #333;
            --btn-color: #333;
            --shadow-color: rgba(0, 0, 0, 0.2);
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.4);
        }

        /* --- الإعدادات العامة --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* لمنع ظهور شريط التمرير بسبب العناصر العائمة */
            transition: background 1s ease;
        }

        /* --- حاوية الأشكال العائمة --- */
        #shapes-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .shape {
            position: absolute;
            font-size: 2rem;
            animation: floatUp linear infinite;
            opacity: 0.7;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg) scale(0.8); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-20vh) rotate(360deg) scale(1.2); opacity: 0; }
        }

        /* --- تصميم الظرف (Envelope) --- */
        .envelope-wrapper {
            position: absolute;
            z-index: 10;
            cursor: pointer;
            animation: floatUpDown 3s ease-in-out infinite;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes floatUpDown {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .envelope {
            width: 300px;
            height: 200px;
            background: #e0d8c3;
            position: relative;
            border-radius: 8px;
            box-shadow: 0 15px 30px var(--shadow-color);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .envelope::before { /* الغطاء العلوي للظرف */
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 100px solid #d4cbb3;
            transform-origin: top;
            transition: transform 0.6s ease;
            z-index: 3;
        }

        .envelope::after { /* الجوانب */
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 150px solid #ece4d0;
            border-right: 150px solid #ece4d0;
            border-bottom: 100px solid #f2ead6;
            border-top: 100px solid transparent;
            z-index: 2;
        }

        .open-text {
            position: absolute;
            z-index: 4;
            background: var(--btn-color);
            color: #fff;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.1rem;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); box-shadow: 0 0 15px var(--shadow-color); }
            100% { transform: scale(1); }
        }

        /* --- تأثير الفتح --- */
        .envelope-wrapper.open .envelope::before {
            transform: rotateX(180deg);
            z-index: 1;
        }
        .envelope-wrapper.open {
            transform: translateY(200vh); /* إنزال الظرف لأسفل الشاشة */
            opacity: 0;
            pointer-events: none;
        }

        /* --- تصميم بطاقة الدعوة (Glassmorphism) --- */
        .card {
            position: relative;
            z-index: 5;
            width: 90%;
            max-width: 500px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 25px 50px var(--shadow-color);
            color: var(--text-color);
            transform: scale(0.5) translateY(50px);
            opacity: 0;
            pointer-events: none;
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card.show {
            transform: scale(1) translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        .card h1 {
            font-family: 'Cairo', sans-serif;
            font-size: 2.2rem;
            margin-bottom: 10px;
            line-height: 1.4;
            color: var(--text-color);
            text-shadow: 0 2px 4px rgba(255,255,255,0.3);
        }

        .card p.details {
            font-size: 1.2rem;
            margin-bottom: 30px;
            font-weight: 500;
        }

        /* --- العداد التنازلي --- */
        .countdown {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 35px;
            direction: ltr;
        }

        .time-box {
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid var(--glass-border);
            padding: 10px 15px;
            border-radius: 12px;
            min-width: 70px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .time-box span {
            display: block;
            font-size: 1.8rem;
            font-weight: bold;
            font-family: 'Cairo', sans-serif;
        }

        .time-box small {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- الأزرار --- */
        .buttons-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            background: var(--btn-color);
            color: #fff;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px var(--shadow-color);
        }

        .btn-sec {
            background: transparent;
            color: var(--text-color);
            border: 2px solid var(--btn-color);
            box-shadow: none;
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 10px 20px var(--shadow-color);
        }

        .btn-sec:hover {
            background: var(--btn-color);
            color: #fff;
        }

        /* --- زر الصوت --- */
        #audio-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.3s;
        }
        #audio-btn:hover {
            transform: scale(1.1);
        }

        /* --- التجاوب مع الشاشات (Responsive) --- */
        @media (max-width: 480px) {
            .card h1 { font-size: 1.8rem; }
            .time-box { min-width: 60px; padding: 8px; }
            .time-box span { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="https://cdn.pixabay.com/download/audio/2022/01/18/audio_d0a13f69d2.mp3?filename=acoustic-guitars-playing-13291.mp3" type="audio/mpeg">
    </audio>
    <button id="audio-btn">🔈</button>

    <div id="shapes-container"></div>

    <div class="envelope-wrapper" id="envelope-wrapper">
        <div class="envelope">
            <div class="open-text">اضغط للفتح 💌</div>
        </div>
    </div>

    <div class="card" id="card">
        <h1>بكل حب وسعادة،<br>ندعوكم لمشاركتنا فرحتنا!</h1>
        <p class="details">💍 فرح 💍<br>26 / 6 / 2026 - 10:00 مساءً<br>قاعة جراند بلازا</p>
        
        <div class="countdown">
            <div class="time-box">
                <span id="days">00</span>
                <small>أيام</small>
            </div>
            <div class="time-box">
                <span id="hours">00</span>
                <small>ساعات</small>
            </div>
            <div class="time-box">
                <span id="minutes">00</span>
                <small>دقائق</small>
            </div>
            <div class="time-box">
                <span id="seconds">00</span>
                <small>ثواني</small>
            </div>
        </div>

        <div class="buttons-container">
            <button class="btn">تأكيد الحضور (RSVP)</button>
            <button class="btn btn-sec">إضافة للتقويم 📅</button>
        </div>
    </div>

    <script>
        // --- 1. مصفوفة الثيمات العشوائية ---
        const themes = [
            {
                name: 'Hearts',
                bgGradient: 'linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%)',
                textColor: '#d6336c',
                btnColor: '#e64980',
                shadowColor: 'rgba(230, 73, 128, 0.4)',
                elements: ['❤️', '💖', '💕', '🤍', '🌸']
            },
            {
                name: 'Confetti',
                bgGradient: 'linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%)',
                textColor: '#4b0082',
                btnColor: '#8a2be2',
                shadowColor: 'rgba(138, 43, 226, 0.4)',
                elements: ['🎉', '🎊', '✨', '🟧', '🔵', '🔻']
            },
            {
                name: 'Stars',
                bgGradient: 'linear-gradient(135deg, #0f2027, #203a43, #2c5364)',
                textColor: '#fff', // نص أبيض لأن الخلفية داكنة
                btnColor: '#f1c40f', // ذهبي
                shadowColor: 'rgba(241, 196, 15, 0.5)',
                elements: ['⭐', '✨', '🌟', '💫', '🌙']
            },
            {
                name: 'Balloons',
                bgGradient: 'linear-gradient(135deg, #89f7fe 0%, #66a6ff 100%)',
                textColor: '#1a365d',
                btnColor: '#2b6cb0',
                shadowColor: 'rgba(43, 108, 176, 0.4)',
                elements: ['🎈', '☁️', '🕊️', '🎀']
            }
        ];

        // اختيار ثيم عشوائي
        const selectedTheme = themes[Math.floor(Math.random() * themes.length)];

        // تطبيق الألوان على CSS Variables
        document.documentElement.style.setProperty('--bg-gradient', selectedTheme.bgGradient);
        document.documentElement.style.setProperty('--text-color', selectedTheme.textColor);
        document.documentElement.style.setProperty('--btn-color', selectedTheme.btnColor);
        document.documentElement.style.setProperty('--shadow-color', selectedTheme.shadowColor);

        // تخصيص لون زجاج البطاقة للثيمات الداكنة (مثل النجوم)
        if(selectedTheme.name === 'Stars') {
            document.documentElement.style.setProperty('--glass-bg', 'rgba(0, 0, 0, 0.4)');
            document.documentElement.style.setProperty('--glass-border', 'rgba(255, 255, 255, 0.1)');
        }

        // --- 2. توليد الأشكال العائمة بناءً على الثيم ---
        const shapesContainer = document.getElementById('shapes-container');
        const numberOfShapes = 25; // عدد الأشكال التي ستظهر في الخلفية

        for (let i = 0; i < numberOfShapes; i++) {
            const shape = document.createElement('div');
            shape.classList.add('shape');
            // اختيار شكل عشوائي من مصفوفة الثيم المختار
            shape.innerText = selectedTheme.elements[Math.floor(Math.random() * selectedTheme.elements.length)];
            
            // مواقع وأحجام وسرعات عشوائية
            shape.style.left = `${Math.random() * 100}vw`;
            shape.style.animationDuration = `${Math.random() * 5 + 5}s`; // من 5 إلى 10 ثواني
            shape.style.animationDelay = `${Math.random() * 5}s`; // تأخير عشوائي للبدء
            shape.style.fontSize = `${Math.random() * 1.5 + 1}rem`;
            
            shapesContainer.appendChild(shape);
        }

        // --- 3. تأثير فتح الظرف (Unboxing) ---
        const envelopeWrapper = document.getElementById('envelope-wrapper');
        const card = document.getElementById('card');
        const bgMusic = document.getElementById('bg-music');
        const audioBtn = document.getElementById('audio-btn');
        let isMusicPlaying = false;

        envelopeWrapper.addEventListener('click', () => {
            envelopeWrapper.classList.add('open');
            setTimeout(() => {
                card.classList.add('show');
            }, 600); // إظهار البطاقة بعد انتهاء حركة الفتح قليلاً

            // تشغيل الموسيقى تلقائياً عند التفاعل
            if(!isMusicPlaying) {
                bgMusic.play().catch(e => console.log("المتصفح منع التشغيل التلقائي"));
                audioBtn.innerText = '🔊';
                isMusicPlaying = true;
            }
        });

        // --- 4. التحكم في الموسيقى ---
        audioBtn.addEventListener('click', () => {
            if (isMusicPlaying) {
                bgMusic.pause();
                audioBtn.innerText = '🔈';
            } else {
                bgMusic.play();
                audioBtn.innerText = '🔊';
            }
            isMusicPlaying = !isMusicPlaying;
        });

        // --- 5. العداد التنازلي (Countdown Timer) ---
        // تاريخ الحدث: 26 يونيو 2026 الساعة 10 مساءً
        const eventDate = new Date("June 26, 2026 22:00:00").getTime();

        const countdown = setInterval(() => {
            const now = new Date().getTime();
            const distance = eventDate - now;

            // الحسابات الزمنية
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // عرض النتائج مع إضافة صفر إذا كان الرقم أقل من 10
            document.getElementById("days").innerText = days < 10 ? "0" + days : days;
            document.getElementById("hours").innerText = hours < 10 ? "0" + hours : hours;
            document.getElementById("minutes").innerText = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("seconds").innerText = seconds < 10 ? "0" + seconds : seconds;

            // إذا انتهى الوقت
            if (distance < 0) {
                clearInterval(countdown);
                document.querySelector(".countdown").innerHTML = "<h2>لقد حان وقت الفرح! 💍🎉</h2>";
            }
        }, 1000);
    </script>
</body>
</html>
