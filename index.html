<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إهداء خاص لمريومتي 💖</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

        body {
            font-family: 'Cairo', sans-serif;
            background-color: #fdf2f8; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            direction: rtl;
        }

        .container {
            width: 90%;
            max-width: 600px;
            background-color: #fff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            text-align: center;
            border: 2px solid #f9a8d4;
        }

        h1, h2 {
            color: #db2777;
            margin-bottom: 20px;
        }

        p {
            color: #6b7280;
            font-size: 1.1em;
            margin-bottom: 10px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            margin: 10px 0;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 1em;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #f472b6;
        }

        .btn {
            background-color: #ec4899;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1em;
            transition: background-color 0.3s ease, transform 0.2s ease;
            font-weight: bold;
        }

        .btn:hover {
            background-color: #db2777;
            transform: translateY(-2px);
        }

        .feedback {
            font-weight: bold;
            color: #ef4444; 
            margin-top: 15px;
            font-size: 1.2em;
        }

        .success-msg {
            color: #10b981; 
        }

        #quiz-screen, #gallery-screen {
            display: none;
        }
        
        #q2-container, #q3-container {
            display: none; 
        }

        .quiz-question {
            margin-bottom: 25px;
            text-align: right;
            border-bottom: 1px solid #f9a8d4;
            padding-bottom: 15px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .choices {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        .choice {
            background-color: #fff1f2;
            padding: 10px 15px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .choice:hover {
            background-color: #fecdd3;
        }

        input[type="radio"] {
            margin-left: 10px;
            cursor: pointer;
        }

        /* --- تصميم السلايدر (الصور والأسهم) --- */
        #gallery-screen h1.gallery-title {
            color: #db2777;
            text-align: center;
            margin-bottom: 20px;
            font-size: 2.5em;
        }

        .slider-container {
            display: flex;
