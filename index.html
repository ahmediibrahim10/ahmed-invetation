<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إهداء خاص لمريومتي 💖</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

        body {
            font-family: 'Cairo', sans-serif;
            background-color: #fdf2f8; /* خلفية بينك هادية */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            direction: rtl;
        }

        .container {
            width: 90%;
            max-width: 600px;
            background-color: #fff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            text-align: center;
            border: 2px solid #f9a8d4;
        }

        h1, h2 {
            color: #db2777;
            margin-bottom: 20px;
        }

        p {
            color: #6b7280;
            font-size: 1.1em;
            margin-bottom: 10px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            margin: 10px 0;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 1em;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #f472b6;
        }

        .btn {
            background-color: #ec4899;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1em;
            transition: background-color 0.3s ease, transform 0.2s ease;
            font-weight: bold;
        }

        .btn:hover {
            background-color: #db2777;
            transform: translateY(-2px);
        }

        .feedback {
            font-weight: bold;
            color: #ef4444; /* لون أحمر للغلط */
            margin-top: 15px;
            font-size: 1.2em;
        }

        .success-msg {
            color: #10b981; /* لون أخضر للصح */
        }

        /* إخفاء الشاشات والأسئلة في البداية */
        #quiz-screen, #gallery-screen {
            display: none;
        }
        
        #q2-container, #q3-container {
            display: none; /* هيظهروا بس لما تجاوب اللي قبلهم صح */
        }

        .quiz-question {
            margin-bottom: 25px;
            text-align: right;
            border-bottom: 1px solid #f9a8d4;
            padding-bottom: 15px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .choices {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        .choice {
            background-color: #fff1f2;
            padding: 10px 15px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .choice:hover {
            background-color: #fecdd3;
        }

        input[type="radio"] {
            margin-left: 10px;
            cursor: pointer;
        }

        /* قسم الصور (الجاليري) */
        #gallery-screen h1.gallery-title {
            color: #db2777;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .gallery-images {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .gallery-images img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 15px;
            border: 3px solid #f472b6;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .gallery-images img:hover {
            transform: scale(1.1);
        }

    </style>
</head>
<body>

<div class="container">
    
    <!-- الصفحة الأولى: كلمة السر -->
    <div id="login-screen">
        <h1>ايه كلمه السر؟</h1>
        <input type="text" id="password-input" placeholder="كلمة السر هنا...">
        <button class="btn" id="login-btn">دخول</button>
        <p id="login-feedback" class="feedback"></p>
    </div>

    <!-- الصفحة التانية: الأسئلة -->
    <div id="quiz-screen">
        <h1>كدا صح يا قلبي! 💖</h1>
        <p>جاوبي عشان تشوفي المفاجأة..</p>

        <!-- السؤال الأول -->
        <div class="quiz-question" id="q1-container">
            <h2>1- اكتر حاجه بحبها فيكي ايه؟</h2>
            <div class="choices">
                <label class="choice"><input type="radio" name="q1" value="فخادك">فخادك</label>
                <label class="choice"><input type="radio" name="q1" value="قلبك">قلبك</label>
                <label class="choice"><input type="radio" name="q1" value="عيونك">عيونك</label>
                <label class="choice"><input type="radio" name="q1" value="كل حاجه">كل حاجه</label>
            </div>
            <p id="q1-feedback" class="feedback"></p>
        </div>

        <!-- السؤال التاني (مخفي لحد ما تجاوب الأول صح) -->
        <div class="quiz-question" id="q2-container">
            <h2>2- نفسي اعمل معاكي ايه بكرا؟</h2>
            <div class="choices">
                <label class="choice"><input type="radio" name="q2" value="واحد">واحد</label>
                <label class="choice"><input type="radio" name="q2" value="اتنين">اتنين</label>
                <label class="choice"><input type="radio" name="q2" value="تلاته">تلاته</label>
                <label class="choice"><input type="radio" name="q2" value="اربعه">اربعه</label>
            </div>
            <p id="q2-feedback" class="feedback"></p>
        </div>

        <!-- السؤال التالت (مخفي لحد ما تجاوب التاني صح) -->
        <div class="quiz-question" id="q3-container">
            <h2>3- يوم عيد ميلادي الغلط ايه؟</h2>
            <div class="choices">
                <label class="choice"><input type="radio" name="q3" value="28/10/2007">28/10/2007</label>
                <label class="choice"><input type="radio" name="q3" value="28/10/2007_alt">28/10/2007</label> 
                <label class="choice"><input type="radio" name="q3" value="28/9/2007">28/9/2007</label>
                <label class="choice"><input type="radio" name="q3" value="14/10/2007">14/10/2007</label>
            </div>
            <p id="q3-feedback" class="feedback"></p>
        </div>

    </div>

    <!-- الصفحة الأخيرة: سكشن بحبك والصور -->
    <div id="gallery-screen">
        <h1 class="gallery-title">بحبك 💖</h1>
        <div class="gallery-images">
            <img src="image_841469.jpg" alt="مريومتي">
            <img src="image_841483.jpg" alt="مريومتي">
            <img src="image_841487.jpg" alt="مريومتي">
            <img src="image_8414a1.jpg" alt="مريومتي">
        </div>
    </div>

</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        // الشاشات
        const loginScreen = document.getElementById('login-screen');
        const quizScreen = document.getElementById('quiz-screen');
        const galleryScreen = document.getElementById('gallery-screen');

        // عناصر تسجيل الدخول
        const passwordInput = document.getElementById('password-input');
        const loginBtn = document.getElementById('login-btn');
        const loginFeedback = document.getElementById('login-feedback');

        // حاويات الأسئلة
        const q2Container = document.getElementById('q2-container');
        const q3Container = document.getElementById('q3-container');

        // رسايل الرد لكل سؤال
        const q1Feedback = document.getElementById('q1-feedback');
        const q2Feedback = document.getElementById('q2-feedback');
        const q3Feedback = document.getElementById('q3-feedback');

        // 1. منطق الدخول (كلمة السر)
        loginBtn.addEventListener('click', () => {
            const enteredPassword = passwordInput.value.trim();
            if (enteredPassword === 'وريني فخادك') {
                loginScreen.style.display = 'none';
                quizScreen.style.display = 'block';
            } else {
                loginFeedback.className = 'feedback';
                loginFeedback.textContent = 'غلط يا مريومتي';
            }
        });

        // 2. منطق السؤال الأول
        const q1Radios = document.querySelectorAll('input[name="q1"]');
        q1Radios.forEach(radio => {
            radio.addEventListener('change', (e) => {
                if (e.target.value === 'كل حاجه') {
                    q1Feedback.className = 'feedback success-msg';
                    q1Feedback.textContent = 'صح يا روحي 💖';
                    q2Container.style.display = 'block'; // اظهر السؤال التاني
                } else {
                    q1Feedback.className = 'feedback';
                    q1Feedback.textContent = 'احا يا مريومتي';
                    q2Container.style.display = 'none'; // خبي اللي بعده لو غيرت رأيها لغلط
                    q3Container.style.display = 'none';
                }
            });
        });

        // 3. منطق السؤال التاني
        const q2Radios = document.querySelectorAll('input[name="q2"]');
        q2Radios.forEach(radio => {
            radio.addEventListener('change', (e) => {
                if (e.target.value === 'اتنين') {
                    q2Feedback.className = 'feedback success-msg';
                    q2Feedback.textContent = 'شاطرة يا قلبي 🥰';
                    q3Container.style.display = 'block'; // اظهر السؤال التالت
                } else {
                    q2Feedback.className = 'feedback';
                    q2Feedback.textContent = 'مش تنين انا';
                    q3Container.style.display = 'none';
                }
            });
        });

        // 4. منطق السؤال التالت والأخير
        const q3Radios = document.querySelectorAll('input[name="q3"]');
        q3Radios.forEach(radio => {
            radio.addEventListener('change', (e) => {
                if (e.target.value === '28/9/2007') {
                    q3Feedback.className = 'feedback success-msg';
                    q3Feedback.textContent = 'أخيراً! ثواني هوريكي المفاجأة...';
                    
                    // تأخير بسيط ثانية واحدة عشان تلحق تقرأ إنها جاوبت صح وبعدين ينقلها للصور
                    setTimeout(() => {
                        quizScreen.style.display = 'none';
                        galleryScreen.style.display = 'block';
                    }, 1500);

                } else {
                    q3Feedback.className = 'feedback';
                    q3Feedback.textContent = 'يومك اسود';
                }
            });
        });
    });
</script>

</body>
</html>
